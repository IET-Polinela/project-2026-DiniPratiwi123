{% extends 'base.html' %}

{% block title %}Hapus Laporan{% endblock %}

{% block content %}
<nav aria-label="breadcrumb">
    <ol class="breadcrumb">
        <li class="breadcrumb-item"><a href="{% url 'home' %}">Home</a></li>
        <li class="breadcrumb-item"><a href="{% url 'report_list' %}">Reports</a></li>
        <li class="breadcrumb-item active" aria-current="page">Hapus Laporan</li>
    </ol>
</nav>

<div class="card">
    <div class="card-body">
        <h1 class="card-title mb-3">Hapus Laporan</h1>
        <p>Apakah kamu yakin ingin menghapus laporan ini?</p>
        <p><strong>{{ report.title }}</strong></p>

        <form method="POST">
            {% csrf_token %}
            <button type="submit" class="btn btn-danger">Ya, Hapus</button>
            <a href="{% url 'report_list' %}" class="btn btn-secondary">Batal</a>
        </form>
    </div>
</div>
{% endblock %}
